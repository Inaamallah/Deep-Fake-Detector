# nginx/nginx.conf  ← CREATE this file (create the nginx/ directory first)

# worker_processes auto: Nginx automatically sets one worker process per
# CPU core. For static file serving this is the optimal setting.
worker_processes auto;

# error_log: write error logs to stdout so Docker can capture them with
# `docker logs`. In a traditional VM deployment you would write to a file,
# but containers work better with stdout/stderr logging.
error_log /dev/stderr warn;

pid /tmp/nginx.pid;

events {
    # worker_connections: how many simultaneous connections each worker
    # process can handle. 1024 is a safe default for a single-machine
    # deployment. For high-traffic production, you would increase this
    # alongside the system's file descriptor limit (ulimit -n).
    worker_connections 1024;

    # use epoll: Linux's most efficient I/O event notification mechanism.
    # Nginx uses this automatically on Linux, but being explicit is good
    # documentation of what the system is actually doing.
    use epoll;

    # multi_accept: each worker accepts all pending connections at once
    # rather than one at a time. This reduces the number of event loop
    # iterations needed under high load.
    multi_accept on;
}

http {
    # Include MIME type mappings so Nginx serves .js files as application/javascript,
    # .css files as text/css, etc. Without this, browsers would refuse to
    # execute JS files served as text/plain.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # sendfile: use the kernel's sendfile() syscall to transfer files to
    # network sockets without copying through user space. This is dramatically
    # faster for serving large static files (video files, heatmap images).
    sendfile on;
    tcp_nopush on;

    # keepalive_timeout: how long to keep an idle connection open.
    # 65 seconds is the standard recommendation — long enough to handle
    # the React app's multiple parallel requests on page load.
    keepalive_timeout 65;

    # Compression: gzip text-based responses (HTML, JSON, JS, CSS).
    # This typically cuts bandwidth by 60-80% for API responses.
    # We do NOT compress images (png, jpg) — they are already compressed;
    # trying to compress them again wastes CPU and may increase their size.
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml;
    gzip_min_length 1024;   # only compress responses larger than 1KB

    # Structured access log in JSON format.
    # This format makes logs machine-parseable by tools like Grafana Loki,
    # Elasticsearch, or CloudWatch without needing a log parser.
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /dev/stdout json_combined;

    # Include the per-server configuration
    include /etc/nginx/conf.d/*.conf;
}