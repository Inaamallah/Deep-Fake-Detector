# nginx/default.conf  ← CREATE this file

# Upstream block: gives a name to our FastAPI backend so we can reference
# it by name rather than hardcoding the IP. In docker-compose, container
# names act as DNS names — "api" resolves to the API container's IP.
upstream fastapi_backend {
    server api:8000;

    # keepalive 32: maintain up to 32 persistent connections to the backend.
    # Without this, every proxied request would require a new TCP handshake
    # to the API container, which adds ~1ms of latency per request.
    keepalive 32;
}

# Large client body size for video uploads — must match max_video_size_mb.
# Without this, Nginx would reject file uploads larger than its default (1MB)
# before the request even reaches FastAPI, producing a confusing 413 error.
client_max_body_size 520M;

# Generous timeouts for video upload and analysis.
# A 500MB upload on a slow connection could take several minutes.
proxy_read_timeout 300s;
proxy_send_timeout 300s;

server {
    listen 80;
    server_name _;   # match any hostname — single-domain deployment

    # ── Security headers ──────────────────────────────────────────────
    # These headers tell browsers how to handle your content securely.
    # They are trivial to add here and meaningful for protection.

    # Prevent browsers from MIME-sniffing — serve files as declared type only.
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking by forbidding your site from being iframed.
    add_header X-Frame-Options "DENY" always;

    # Enable browser XSS filter (legacy but harmless).
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy: don't leak your URL in the Referer header to third parties.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;


    # ── API proxy ─────────────────────────────────────────────────────
    # Any request to /api/* goes to the FastAPI backend.
    # The trailing slash on proxy_pass is intentional: it strips the /api
    # prefix so FastAPI sees /v1/... rather than /api/v1/...
    #
    # Wait — our FastAPI routes are at /api/v1/..., so we actually want
    # to preserve the /api prefix. The proxy_pass below passes the full
    # path through unchanged.
    location /api/ {
        proxy_pass http://fastapi_backend;

        # These headers tell FastAPI the original request details,
        # which it needs for rate limiting (getting the real client IP)
        # and for generating correct redirect URLs.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Use HTTP/1.1 and keep-alive for the upstream connection,
        # which enables the keepalive pool defined in the upstream block.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── OpenAPI docs (Swagger UI and ReDoc) ───────────────────────────
    # These are served by FastAPI but accessible at /docs and /redoc
    # — they need the same proxy rules as /api/.
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass         http://fastapi_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── React static files ────────────────────────────────────────────
    # Everything that is NOT /api/* is served as a static file from the
    # React build directory. This is the core of single-page application
    # serving: all routes (/, /about, /jobs/abc) serve index.html, and
    # the React router handles the URL client-side.
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # try_files: attempt to serve the exact file requested, then the
        # exact directory, then fall back to /index.html. The fallback
        # is what makes React Router work — /jobs/abc123 does not exist
        # as a real file, so Nginx serves index.html and React Router
        # reads the URL and renders the right component.
        try_files $uri $uri/ /index.html;

        # Long cache for hashed static assets (JS bundles, CSS).
        # Vite adds a content hash to asset filenames, so name changes
        # when content changes. We can therefore cache them forever —
        # when the code changes, the filename changes, breaking the cache.
        location ~* \.(js|css|woff2|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html must NOT be cached — it is the entry point and must
        # always be fresh so users pick up new deployments immediately.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}